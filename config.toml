enable-magisk-update = true   # set this to false if you do not want to receive updates for the module in magisk app

# add 'enabled = false' for not patching a specific app or remove it from the config
# see https://github.com/j-hc/revanced-magisk-module/blob/main/CONFIG.md for more detailed explanations

# you can use rvmm-config-gen to generate a config

[YouTube]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
patches-source = "inotia00/revanced-patches"
integrations-source = "inotia00/revanced-integrations"
patches-version = "v4.9.1-dev.1"
integrations-version = "v1.10.1-dev.1"
cli-source = "inotia00/revanced-cli"
rv-brand = "inotia00 ReVanced"
build-mode = "module"
version = "19.20.35"
included-patches = "'Force hide player buttons background' 'Hide Shorts dimming' 'Hide animated button background' 'Hide double tap overlay filter' 'Hide double tap to like animations' 'MaterialYou' 'Visual preferences icons'"
excluded-patches = "'Custom branding icon YouTube' 'Custom branding name YouTube' 'Custom package name' 'Theme'"

[Music]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music/"
patches-source = "inotia00/revanced-patches"
integrations-source = "inotia00/revanced-integrations"
patches-version = "v4.9.1-dev.1"
integrations-version = "v1.10.1-dev.1"
cli-source = "inotia00/revanced-cli"
rv-brand = "inotia00 ReVanced"
arch = "arm64-v8a"
build-mode = "module"
version = "7.04.51"
included-patches = "'Hide double tap overlay filter' 'Hide overlay filter' 'Hide player overlay filter'"
excluded-patches = "'Custom branding icon YouTube Music' 'Custom branding name YouTube Music' 'Custom package name'"

