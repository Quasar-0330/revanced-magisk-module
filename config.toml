enable-magisk-update = true
parallel-jobs = 1
patches-source = "inotia00/revanced-patches"
#cli-source = "inotia00/revanced-cli"
rv-brand = "inotia00 ReVanced"
patches-version = "latest"
integrations-version = "latest"

[YouTube-Extended]
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
build-mode = "apk"
version = "19.16.39"
included-patches = "'Force hide player buttons background' 'Hide Shorts dimming' 'Hide shortcuts' 'MaterialYou' 'Return YouTube Username'"
excluded-patches = "'Custom branding icon for YouTube' 'Custom branding name for YouTube' 'Theme'"
patcher-args = "-e 'Custom Shorts action buttons' -OiconType=outline -Oexplore=true -Osubscriptions=true -Osearch=true -OselectedTranslations=ja-rJP -OselectedStringResources=ja -e 'Overlay buttons' -OiconType=thin -OoutlineIcon=true"

[Music-Extended]
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
arch = "arm64-v8a"
build-mode = "apk"
version = "7.16.53"
included-patches = "'Hide overlay filter' 'Hide player overlay filter' 'Return YouTube Username'"
excluded-patches = "'Custom branding icon for YouTube Music' 'Custom branding name for YouTube Music'"
patcher-args = "-OselectedTranslations=ja-rJP -OselectedStringResources=ja"
