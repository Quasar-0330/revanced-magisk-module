enable-magisk-update = true
parallel-jobs = 2
patches-source = "inotia00/revanced-patches"
cli-source = "inotia00/revanced-cli"
rv-brand = "ReVanced Extended"
patches-version = "dev"

[YouTube]
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
build-mode = "module"
version = "19.44.39"
included-patches = "'Force hide player buttons background' 'MaterialYou'"
excluded-patches = "'Alternative thumbnails' 'Bypass image region restrictions' 'Change form factor' 'Change live ring click action' 'Change player flyout menu toggles' 'Change share sheet' 'Change start page' 'Custom Shorts action buttons' 'Custom branding icon for YouTube' 'Custom branding name for YouTube' 'Custom double tap length' 'Disable QUIC protocol' 'Disable forced auto audio tracks' 'Disable forced auto captions' 'Disable haptic feedback' 'Enable OPUS codec' 'Enable debug logging' 'Enable gradient loading screen' 'Hook YouTube Music actions' 'Hook download actions' 'Return YouTube Dislike' 'Spoof app version' 'Theme' 'Watch history'"
patcher-args = "-e 'Overlay buttons' -OchangeTopButtons=true -e 'Snack bar components' -OcornerRadius=32.0dip -OapplyCornerRadiusToPlaylistBottomBar=true -e 'Translations for YouTube' -OselectedTranslations=ja-rJP -OselectedStringResources=ja "

[Music]
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
arch = "arm64-v8a"
build-mode = "module"
version = "8.10.51"
included-patches = "'Disable music video in album' 'Hide player overlay filter'"
excluded-patches = "'Bitrate default value' 'Bypass image region restrictions' 'Certificate spoof' 'Change share sheet' 'Change start page' 'Custom branding icon for YouTube Music' 'Custom branding name for YouTube Music' 'Disable QUIC protocol' 'Disable forced auto captions' 'Enable OPUS codec' 'Enable debug logging' 'Enable landscape mode' 'Hide account components' 'Restore old style library shelf' 'Return YouTube Dislike' 'Sanitize sharing links' 'Spoof app version' 'Watch history'"
patcher-args = "-e 'Dark theme' -OmaterialYou=true -e 'Translations for YouTube Music' -OselectedTranslations=ja-rJP -OselectedStringResources=ja "
